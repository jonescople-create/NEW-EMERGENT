ted_fruit_ids:["2","5"],views:4520,leaf_medicine:{has_leaf_use:!0,leaf_name:"Ackee Leaf",traditional_uses:["Leaf infusion used in Caribbean folk medicine to treat colds and flu symptoms","Bark decoction traditionally applied for wound healing and skin irritation","Leaves used in poultice form for headache relief in Jamaican traditional practice","Seeds roasted and used carefully in some African traditional remedies (requires expert preparation)"],preparation:"Dry mature ackee leaves in shade for 3–5 days. Steep 3–4 dried leaves in 2 cups of boiling water for 10–15 minutes. Strain and allow to cool before drinking. Maximum one cup per day.",safety_warnings:["NEVER consume raw ackee seeds or unripe fruit — they contain hypoglycin A and B, which are toxic","Leaf preparations should be used sparingly and not as a substitute for medical treatment","Pregnant or breastfeeding women should avoid ackee leaf preparations","Consult a healthcare provider before use, especially if taking medications"],disclaimer:"This information documents traditional Caribbean folk medicine practices. It is not medical advice. Never replace conventional medical treatment with herbal remedies."}},{id:"2",name:"Breadfruit",scientific_name:"Artocarpus altilis",description:"Breadfruit is a starchy, versatile tropical fruit that has been a staple food in the Caribbean for centuries. When cooked, its texture resembles freshly baked bread, giving it its name. It can be roasted, fried, boiled, or even made into flour.",nutrition:"Excellent source of complex carbohydrates, dietary fiber, vitamin C, potassium, and B vitamins. One cup contains about 227 calories.",health_benefits:["High in fiber promoting digestive health","Rich in potassium supporting cardiovascular function","Contains antioxidants that fight free radicals","Good source of energy from complex carbohydrates","Provides essential B vitamins for metabolism"],seasonality:"June–September (peak), available year-round in some regions",origin:"South Pacific, widely grown throughout the Caribbean",image_url:`${Se}/fruit-images/fruit-breadfruit.jpg`,slug:"breadfruit",category:["popular","seasonal"],how_to_eat:"Can be roasted directly over fire until skin is charred and inside is soft. Also excellent fried as chips, boiled like potatoes, or baked. Green breadfruit is starchy like potato; ripe breadfruit is sweeter.",storage:"Store unripe breadfruit at room temperature for 1-3 days. Once ripe, refrigerate and use within 2 days. Can be frozen after cooking for up to 3 months.",color:"#8BC34A",emoji:"🍞",related_fruit_ids:["1","4"],views:3890,leaf_medicine:{has_leaf_use:!0,leaf_name:"Breadfruit Leaf",traditional_uses:["Leaf tea is a traditional Caribbean remedy for lowering high blood pressure (hypertension)","Latex from the leaf used topically to treat skin conditions and fungal infections","Leaf poultice applied to relieve joint pain and inflammation in Polynesian medicine","Dried leaves burned and ash used in traditional wound treatment"],preparation:"Select 2–3 mature, dark green breadfruit leaves. Wash thoroughly and tear into pieces. Boil in 3 cups of water for 15–20 minutes until the water turns amber. Strain and drink warm. Take once daily.",safety_warnings:["Breadfruit leaf tea may lower blood pressure — use cautiously if on hypertension medication","The latex sap can cause skin irritation in sensitive individuals — handle with care","Do not exceed one cup of leaf tea per day","Not recommended for pregnant or breastfeeding women without medical consultation"],disclaimer:"This information documents traditional Caribbean and Polynesian folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider."}},{id:"3",name:"Soursop",scientific_name:"Annona muricata",description:"Soursop, also known as graviola or guanábana, is a large green spiny fruit with a creamy white flesh that has a unique sweet-sour flavor combining notes of strawberry and pineapple with citrusy undertones. It's widely used in juices, smoothies, and ice cream across the Caribbean.",nutrition:"Rich in vitamin C, B vitamins, potassium, magnesium, and fiber. One cup of pulp contains about 148 calories with 7.4g of fiber.",health_benefits:["Extremely high in vitamin C boosting immune defense","Contains acetogenins studied for anti-cancer properties","Rich in antioxidants reducing oxidative stress","Anti-inflammatory compounds for joint health","Natural antimicrobial properties"],seasonality:"Year-round in tropical climates, peak May–September",origin:"Central America and Caribbean, grown throughout tropics",image_url:`${Se}/fruit-images/fruit-soursop.jpg`,slug:"soursop",category:["popular","medicinal","seasonal"],how_to_eat:"Cut the fruit in half and scoop out the white flesh. Remove the large black seeds. Eat fresh, blend into juice with water and sweetener, or use in smoothies, ice cream, and desserts. The pulp freezes beautifully.",storage:"Store unripe soursop at room temperature until slightly soft. Ripe fruit keeps 2-3 days in refrigerator. Freeze pulp for up to 6 months.",color:"#4CAF50",emoji:"🟢",related_fruit_ids:["6","8"],views:5200,leaf_medicine:{has_leaf_use:!0,leaf_name:"Soursop Leaf (Graviola Leaf)",traditional_uses:["Graviola leaf tea is the most widely used herbal tea in Caribbean folk medicine — prized for its calming, sedative effects","Used traditionally to promote sleep and reduce anxiety and restlessness","Leaf extracts studied for anti-cancer properties — acetogenins in leaves showed activity against cancer cell lines in laboratory research (Journal of Natural Products, 1996)","Traditional remedy for reducing fever, inflammation, and parasitic infections","Leaf poultice applied externally to soothe skin irritation and eczema","Used in some Caribbean communities to help manage blood sugar levels"],preparation:"Wash 2–3 fresh or dried soursop leaves. Place in a teapot and pour 2 cups of boiling water over them. Steep for 10–15 minutes. Strain and drink warm. Add honey or lime to taste. Best consumed in the evening for its calming properties.",safety_warnings:["CRITICAL: Long-term, excessive consumption of soursop leaf tea is linked to neurotoxicity — compounds called annonacins may cause nerve damage and movement disorders similar to Parkinson's disease","Limit consumption to 2–3 cups per week maximum — do not drink daily for extended periods","Soursop leaves can lower blood pressure and blood sugar — dangerous if combined with diabetes or hypertension medications without medical supervision","NEVER use soursop as a cancer treatment replacement — no human clinical trials support this use","Pregnant and breastfeeding women should completely avoid soursop leaf preparations","Do not consume the seeds — they contain concentrated neurotoxins"],disclaimer:"This information documents traditional Caribbean folk medicine practices and published laboratory research. It is NOT medical advice. Soursop leaf tea should never replace conventional medical treatment for any condition, including cancer. Always consult a qualified healthcare provider before use."}},{id:"4",name:"Guinep",scientific_name:"Melicoccus bijugatus",description:"Guinep, also called Spanish lime or quenepa, is a beloved Caribbean street fruit. These small green fruits grow in clusters and have a thin, brittle shell encasing a juicy, tangy-sweet salmon-colored pulp surrounding a large seed. A true taste of Caribbean summer.",nutrition:"Good source of vitamin C, vitamin A, calcium, phosphorus, and iron. Low in calories with about 58 calories per 100g.",health_benefits:["Rich in vitamin A supporting eye health","High calcium content for bone strength","Iron content helps prevent anemia","Tryptophan content may improve sleep quality","Low glycemic index suitable for blood sugar management"],seasonality:"June–September (summer fruit)",origin:"Northern South America and Caribbean islands",image_url:`${Se}/fruit-images/fruit-guinep.jpg`,slug:"guinep",category:["popular","seasonal"],how_to_eat:"Crack the thin green shell with your teeth or by squeezing. Suck on the juicy pulp surrounding the seed. Don't bite the seed. Some people also make guinep juice by soaking the pulp in water with sugar.",storage:"Keep in a cool, dry place for up to one week. Can refrigerate for up to 2 weeks. The shells dry out over time so eat relatively fresh.",color:"#66BB6A",emoji:"🫒",related_fruit_ids:["2","7"],views:4100},{id:"5",name:"Mango",scientific_name:"Mangifera indica",description:"Known as the 'King of Fruits,' mango is one of the most popular tropical fruits worldwide. Caribbean mangoes are prized for their exceptional sweetness, aromatic fragrance, and silky smooth flesh. Varieties like Julie, East Indian, and Bombay are Caribbean favorites.",nutrition:"Excellent source of vitamins A and C, folate, and fiber. One cup of sliced mango provides about 100 calories and over 100% of daily vitamin C.",health_benefits:["Exceptionally high in vitamin A for eye and skin health","Rich in vitamin C strengthening immune system","Contains digestive enzymes like amylase for gut health","Polyphenols may reduce risk of certain cancers","Folate content supports cell growth and development"],seasonality:"May–August (peak Caribbean mango season)",origin:"South Asia, widely cultivated throughout the Caribbean",image_url:`${Se}/fruit-images/fruit-mango.jpg`,slug:"mango",category:["popular","seasonal"],how_to_eat:"Slice along both sides of the flat seed. Score the flesh in a crosshatch pattern and invert to eat cubes. Also excellent in smoothies, salsas, chutneys, and desserts. Green mangoes are used for pickles and hot sauce.",storage:"Ripen at room temperature. Once ripe (slightly soft, fragrant), refrigerate for up to 5 days. Frozen mango chunks last 6+ months.",color:"#FF9800",emoji:"🥭",related_fruit_ids:["1","8"],views:6800,leaf_medicine:{has_leaf_use:!0,leaf_name:"Mango Leaf",traditional_uses:["Mango leaf tea used traditionally across the Caribbean and South Asia for managing blood sugar levels in type 2 diabetes","Dried mango leaves burned and smoke inhaled to relieve hiccups and throat irritation in Jamaican folk medicine","Young tender mango leaves chewed to strengthen gums and treat mouth ulcers","Leaf decoction used as a traditional remedy for kidney stones and gallstones"],preparation:"Select 5–6 tender, young mango leaves. Wash and soak in 2 cups of water overnight. Strain in the morning and drink on an empty stomach. Alternatively, boil leaves for 10 minutes, strain, and drink warm.",safety_warnings:["Mango leaf tea may lower blood sugar — monitor levels carefully if diabetic or on glucose-lowering medication","May interact with anticoagulant medications","Do not consume in large quantities — moderate use only","Not recommended during pregnancy without medical consultation"],disclaimer:"This information documents traditional Ayurvedic and Caribbean folk medicine practices. It is not medical advice. Always consult a healthcare provider before using herbal remedies."}},{id:"6",name:"Passion Fruit",scientific_name:"Passiflora edulis",description:"Passion fruit is a beautifully aromatic tropical fruit with a tough purple or yellow rind and a fragrant, seed-filled pulpy interior. Its intense sweet-tart flavor makes it a prized ingredient in Caribbean juices, cocktails, desserts, and sauces.",nutrition:"Rich in vitamins A and C, iron, potassium, and dietary fiber. One fruit has only 17 calories but packs significant nutritional value.",health_benefits:["High in antioxidants including vitamin C and beta-carotene","Excellent source of dietary fiber for digestive health","Iron content supports blood oxygen transport","Contains piceatannol which may improve insulin sensitivity","Natural sedative properties promote relaxation and sleep"],seasonality:"Year-round, peak July–February",origin:"South America, widely grown in Caribbean islands",image_url:`${Se}/fruit-images/fruit-passion-fruit.png`,slug:"passion-fruit",category:["popular","medicinal","rare"],how_to_eat:"Cut in half and scoop out the pulp and seeds with a spoon. Seeds are edible and add crunch. Strain for juice, add to yogurt, use in cocktails, or make passion fruit mousse and cheesecake.",storage:"Ripe passion fruit (wrinkled skin) can be refrigerated for 1-2 weeks. Pulp freezes well for up to 3 months.",color:"#9C27B0",emoji:"💜",related_fruit_ids:["3","8"],views:3600,leaf_medicine:{has_leaf_use:!0,leaf_name:"Passion Fruit Leaf (Passiflora Leaf)",traditional_uses:["Passiflora leaf tea is one of the most scientifically validated natural sedatives — used for centuries to treat insomnia and anxiety","Contains flavonoids (chrysin, vitexin) that bind to GABA receptors in the brain, producing a calming effect similar to benzodiazepines but milder","Used traditionally in the Caribbean as a nerve tonic for stress, tension, and restlessness","Leaf infusion used to lower high blood pressure in Caribbean folk medicine","Applied topically as a poultice for burns and skin inflammation"],preparation:"Dry passion fruit leaves in shade for 3–5 days or use fresh. Steep 1–2 leaves in one cup of boiling water for 8–10 minutes. Strain and drink 30 minutes before bedtime for sleep support. Can add honey for sweetness.",safety_warnings:["May cause drowsiness — do not drive or operate machinery after consuming passion fruit leaf tea","Can interact with sedative medications, anti-anxiety drugs, and blood thinners","Not recommended during pregnancy — may stimulate uterine contractions","Do not combine with alcohol or other central nervous system depressants"],disclaimer:"This information documents traditional Caribbean folk medicine practices supported by some clinical research. It is not medical advice. Consult a healthcare provider before use, especially if taking medications."}},{id:"7",name:"Star Apple",scientific_name:"Chrysophyllum cainito",description:"Star apple, known as caimito, is a magical-looking tropical fruit. When cut crosswise, the seeds form a beautiful star pattern. The flesh is sweet, milky-white or purple, with a creamy custard-like texture. It's a cherished dessert fruit across the Caribbean.",nutrition:"Good source of vitamin C, calcium, phosphorus, and iron. Contains about 67 calories per 100g with 2g of fiber.",health_benefits:["Calcium-rich supporting bone and dental health","Contains phosphorus working with calcium for strong bones","Antioxidant properties from polyphenols","Natural remedy traditionally used for throat inflammation","Low glycemic fruit suitable for moderate consumption"],seasonality:"February–May",origin:"Central America and West Indies",image_url:`${Se}/fruit-images/fruit-star-apple.jpg`,slug:"star-apple",category:["rare","seasonal"],how_to_eat:"Cut in half crosswise to reveal the star pattern. Scoop out the creamy flesh with a spoon, avoiding the skin and seeds. The latex near the skin is sticky — avoid it. Best eaten chilled.",storage:"Store at room temperature until ripe (slightly soft). Refrigerate ripe fruit for up to one week. Not suitable for freezing.",color:"#7B1FA2",emoji:"⭐",related_fruit_ids:["4","9"],views:2800},{id:"8",name:"Papaya",scientific_name:"Carica papaya",description:"Papaya is a breakfast staple across the Caribbean, beloved for its sweet, musky flavor and butter-soft orange flesh. Rich in digestive enzymes, it's both a delicious fruit and a natural medicine. Green papaya is also used as a vegetable in salads and stews.",nutrition:"Outstanding source of vitamin C (224% DV per fruit), vitamin A, folate, and papain enzyme. One medium papaya has about 120 calories.",health_benefits:["Contains papain enzyme aiding protein digestion","Extremely high vitamin C content boosting immunity","Rich in beta-carotene for eye health","Anti-inflammatory properties reducing chronic inflammation","Lycopene content may reduce cancer risk"],seasonality:"Year-round in tropical climates",origin:"Central America, grown throughout Caribbean",image_url:`${Se}/fruit-images/fruit-papaya.jpg`,slug:"papaya",category:["popular","medicinal"],how_to_eat:"Cut in half lengthwise, scoop out seeds (edible with peppery flavor). Slice or cube the flesh. Squeeze lime juice over it for a classic Caribbean breakfast. Also excellent in smoothies, salads, and salsas.",storage:"Ripen at room temperature. Ripe papaya keeps 2-3 days in refrigerator. Cut papaya should be consumed within 2 days. Seeds can be dried and used as pepper substitute.",color:"#FF7043",emoji:"🍈",related_fruit_ids:["5","3"],views:4800,leaf_medicine:{has_leaf_use:!0,leaf_name:"Papaya Leaf",traditional_uses:["Papaya leaf extract is gaining scientific recognition for increasing blood platelet count — studied for dengue fever treatment in Southeast Asia and the Caribbean","Contains papain and chymopapain enzymes that aid digestion when consumed as tea","Leaf juice used traditionally to treat malaria and parasitic infections across tropical regions","Applied topically as a poultice for wound healing and to reduce swelling","Leaf tea used in Caribbean folk medicine for liver health and detoxification"],preparation:"Select 1–2 medium-sized mature papaya leaves (avoid very young or very old leaves). Wash thoroughly and remove the thick central stem. Blend or crush leaves and squeeze through cheesecloth to extract juice. Take 1–2 tablespoons of fresh juice daily. Alternatively, steep dried leaf pieces in hot water for 15 minutes for tea.",safety_warnings:["Papaya leaf juice is very bitter — can be mixed with a small amount of honey","May interact with blood-thinning medications (warfarin) due to its effect on platelet activity","AVOID during pregnancy — papain may stimulate uterine contractions","People with latex allergies may have cross-reactivity with papaya compounds","Start with small amounts to test tolerance — some people experience nausea"],disclaimer:"This information documents traditional tropical medicine practices and emerging clinical research. It is not medical advice. Papaya leaf products should not replace prescribed dengue or platelet treatments. Always consult a qualified healthcare provider."}},{id:"9",name:"Naseberry",scientific_name:"Manilkara zapota",description:"Naseberry, also known as sapodilla, is a brown-skinned fruit with exceptionally sweet, malty-flavored flesh that tastes like brown sugar and pear combined. This unassuming fruit is one of the sweetest natural fruits in the world and a Caribbean childhood favorite.",nutrition:"Good source of dietary fiber, vitamin A, vitamin C, iron, and potassium. Contains about 83 calories per 100g with natural sugars.",health_benefits:["Very high in dietary fiber promoting gut health","Tannins have anti-inflammatory and antibacterial properties","Rich in vitamin A for vision health","Natural energy source from healthy sugars","Contains minerals like iron and copper for blood health"],seasonality:"February–June, September–November",origin:"Central America, grown in Caribbean and South Asia",image_url:`${Se}/fruit-images/fruit-naseberry.jpg`,slug:"naseberry",category:["rare","medicinal"],how_to_eat:"Wait until the fruit is soft (like a ripe kiwi). Cut in half, remove the black seeds (they have a hook — don't swallow). Scoop the brown, grainy-sweet flesh with a spoon. Eat fresh for best flavor.",storage:"Ripen at room temperature for 3-7 days. Ripe naseberry keeps 2-3 days refrigerated. Can freeze pulp for smoothies.",color:"#795548",emoji:"🟤",related_fruit_ids:["7","10"],views:2100,leaf_medicine:{has_leaf_use:!0,leaf_name:"Naseberry Leaf & Bark",traditional_uses:["Bark decoction used traditionally in Caribbean and Central American medicine for treating diarrhea and dysentery","Leaf tea used as a mild sedative and to relieve fever","Bark contains tannins with astringent and antibacterial properties — used for wound treatment","Sap (chicle) historically used as the base for chewing gum — has mild antiseptic properties"],preparation:"Collect a small piece of bark (never strip bark completely — it harms the tree). Wash and boil in 2 cups of water for 20 minutes. Strain and drink in small amounts. For leaf tea, steep 3–4 dried leaves in boiling water for 10 minutes.",safety_warnings:["Bark preparations are potent — use in small amounts only","Tannins in high concentration can cause stomach upset","Not recommended for extended daily use","Consult a healthcare provider if taking medications for digestive conditions"],disclaimer:"This information documents traditional Caribbean and Central American folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider."}},{id:"10",name:"Guava",scientific_name:"Psidium guajava",description:"Guava is an incredibly fragrant tropical fruit with pink or white flesh packed with tiny edible seeds. In the Caribbean, guava is essential for making guava paste (guava cheese), jelly, juice, and the beloved guava and cheese pastry. Its aroma is unmistakable.",nutrition:"Extraordinarily high in vitamin C (4x more than oranges), fiber, folate, and potassium. One guava has about 37 calories.",health_benefits:["Highest natural vitamin C content of any common fruit","Rich in lycopene with anti-cancer properties","High fiber helps regulate blood sugar levels","Potassium content supports heart health","Guava leaf tea is used to treat diarrhea and diabetes"],seasonality:"Year-round, peak August–October",origin:"Central America, naturalized throughout Caribbean",image_url:`${Se}/fruit-images/fruit-guava.jpg`,slug:"guava",category:["popular","medicinal","seasonal"],how_to_eat:"Wash and eat whole — skin, seeds, and all are edible. Slice for fruit platters. Blend with water and strain for juice. Cook down with sugar to make guava paste or jelly. Pair with cream cheese for a classic combo.",storage:"Ripen at room temperature. Refrigerate ripe guava for up to 4 days. Guava paste and jelly have long shelf life. Freeze whole guavas for up to 8 months.",color:"#E91E63",emoji:"🩷",related_fruit_ids:["8","6"],views:5100,leaf_medicine:{has_leaf_use:!0,leaf_name:"Guava Leaf",traditional_uses:["Guava leaf tea is one of the most widely used and scientifically validated herbal remedies in the Caribbean — primarily for treating acute diarrhea","Clinical trials published in the Journal of Ethnopharmacology confirmed guava leaf extract significantly reduces duration and severity of infectious diarrhea","Used traditionally to manage blood sugar levels — a 2010 study in Nutrition & Metabolism showed guava leaf tea reduced post-meal blood glucose spikes","Antimicrobial properties effective against oral bacteria — used as a mouthwash for toothache and gum inflammation","Rich in quercetin which has anti-allergic and anti-inflammatory effects","Leaf decoction used topically for hair loss treatment in Caribbean folk medicine"],preparation:"Select 4–5 fresh, young guava leaves (lighter green, from the tips of branches). Wash thoroughly. Boil in 3 cups of water for 10–15 minutes until water reduces to about 1.5 cups. Strain and drink warm. For diarrhea: drink 2–3 times per day until symptoms resolve. For blood sugar: drink one cup after meals.",safety_warnings:["Guava leaf tea may interact with diabetes medications — monitor blood sugar carefully if diabetic","May cause constipation if consumed in very large quantities (tannin content)","Can interact with blood-thinning medications","Moderate consumption — 1–2 cups per day — is generally considered safe for most adults"],disclaimer:"This information documents traditional Caribbean folk medicine practices supported by published clinical research. It is not medical advice. Always consult a qualified healthcare provider before using herbal remedies, especially if taking medications."}},{id:"11",name:"Coconut",scientific_name:"Cocos nucifera",description:"The coconut palm is called the 'Tree of Life' in the Caribbean for good reason — every part is used. Young jelly coconuts provide refreshing water and soft meat, while mature coconuts yield rich cream, oil, and dried copra. Essential to Caribbean cuisine and culture.",nutrition:"Rich in medium-chain triglycerides (MCTs), manganese, copper, and iron. Coconut water is nature's electrolyte drink with 46 calories per cup.",health_benefits:["MCTs provide quick energy and may boost metabolism","Coconut water is a natural electrolyte replenisher","Lauric acid has antimicrobial and antiviral properties","High in manganese for bone health and metabolism","Coconut oil supports skin and hair health"],seasonality:"Year-round",origin:"Indo-Pacific region, iconic across all Caribbean islands",image_url:`${Se}/fruit-images/fruit-coconut.jpg`,slug:"coconut",category:["popular"],how_to_eat:"For young coconuts: cut top open, drink the water, then scoop soft jelly meat. For mature coconuts: crack open, grate the meat for cooking, or blend with water and strain for coconut milk/cream.",storage:"Whole mature coconuts last 2-3 months at room temperature. Opened coconut meat keeps 4-5 days refrigerated. Coconut milk/cream freezes well.",color:"#8D6E63",emoji:"🥥",related_fruit_ids:["2","5"],views:5800,leaf_medicine:{has_leaf_use:!0,leaf_name:"Coconut Palm Leaf & Oil",traditional_uses:["Coconut oil (extracted from the nut, not the leaf) is the primary medicinal product — rich in lauric acid with antimicrobial, antifungal, and antiviral properties","Coconut water used traditionally as an oral rehydration solution for dehydration and cholera recovery","Palm heart (inner core of young fronds) used in Caribbean medicine for kidney health","Coconut husk fiber used traditionally to treat skin conditions and inflammation","Oil pulling with coconut oil practiced for oral health — may reduce plaque and gingivitis"],preparation:"For medicinal oil pulling: take 1 tablespoon of virgin coconut oil, swish in mouth for 15–20 minutes without swallowing, spit out. For topical use: apply cold-pressed virgin coconut oil directly to skin or hair. For hydration: drink fresh coconut water directly from a young green coconut.",safety_warnings:["Coconut oil is high in saturated fat — consume in moderation if managing cholesterol","Some individuals may have coconut allergies (rare but possible)","Coconut water has natural sugars — diabetics should monitor intake","Do not use coconut oil on deep wounds or severe burns — see a doctor"],disclaimer:"This information documents traditional Caribbean and tropical medicine practices. It is not medical advice. Always consult a qualified healthcare provider."}},{id:"12",name:"Tamarind",scientific_name:"Tamarindus indica",description:"Tamarind is a pod-like fruit with a tangy, sweet-sour pulp that's fundamental to Caribbean cooking and refreshments. The brown sticky pulp is used to make tamarind balls (a beloved candy), drinks, sauces, and chutneys. Its unique flavor is both refreshing and addictive.",nutrition:"Excellent source of B vitamins, minerals including iron, magnesium, and potassium. High in tartaric acid and dietary fiber. About 239 calories per 100g.",health_benefits:["Rich in polyphenols with potent antioxidant activity","High magnesium content supports nerve and muscle function","Tartaric acid acts as a natural laxative for digestion","Iron content helps combat anemia","Traditional remedy for fever and sore throat"],seasonality:"March–July",origin:"Africa, widely naturalized in Caribbean",image_url:`${Se}/fruit-images/fruits-tamarind.jpg`,slug:"tamarind",category:["popular","medicinal","seasonal"],how_to_eat:"Crack the brittle shell and remove the pulp. Pull away the stringy fibers. Eat the sticky pulp around the seeds (spit seeds out). Make tamarind balls by rolling pulp with sugar and pepper. Soak in water for tangy juice.",storage:"Unshelled tamarind lasts months in a cool dry place. Pulp keeps indefinitely when stored in airtight container. Tamarind paste lasts years.",color:"#5D4037",emoji:"🫘",related_fruit_ids:["4","10"],views:3400,leaf_medicine:{has_leaf_use:!0,leaf_name:"Tamarind Leaf",traditional_uses:["Tamarind leaf tea used traditionally across Africa and the Caribbean as a fever reducer (antipyretic)","Leaf juice applied to wounds and boils as an antiseptic in Jamaican folk medicine","Poultice of mashed tamarind leaves applied to swollen joints for anti-inflammatory relief","Flowers and leaves used in traditional remedies for sore throat and respiratory infections","Bark decoction used as an astringent for digestive complaints"],preparation:"Collect 8–10 fresh tamarind leaves (the small leaflets from compound leaves). Wash thoroughly. Boil in 2 cups of water for 15 minutes. Strain and drink warm. For external poultice: crush fresh leaves and apply directly to affected area, wrap with cloth for 30 minutes.",safety_warnings:["Tamarind (fruit and leaves) may interact with aspirin and ibuprofen — increasing absorption of these drugs","May lower blood sugar — monitor if diabetic","Large quantities of tamarind can have a laxative effect","Not recommended in high doses during pregnancy"],disclaimer:"This information documents traditional African and Caribbean folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider before use."}},{id:"13",name:"Banana",scientific_name:"Musa acuminata",description:"Bananas are one of the most widely consumed fruits in the Caribbean and the world. Caribbean banana varieties include the sweet Gros Michel, the small and flavorful apple banana, and green bananas used for cooking. Boiled green bananas are a beloved Caribbean side dish, often served with ackee and saltfish.",nutrition:"Excellent source of potassium, vitamin B6, vitamin C, and dietary fiber. One medium banana contains about 105 calories and 27g of carbohydrates.",health_benefits:["Extremely high in potassium supporting heart health and muscle function","Rich in vitamin B6 essential for brain development","Natural prebiotic fiber feeds beneficial gut bacteria","Quick-release energy ideal for athletes and active lifestyles","Contains tryptophan which converts to serotonin for mood support"],seasonality:"Year-round",origin:"Southeast Asia, cultivated extensively across the Caribbean",image_url:`${Se}/fruit-images/fruit-banana.jpg`,slug:"banana",category:["popular","seasonal"],how_to_eat:"Ripe bananas can be peeled and eaten fresh as a snack. Green bananas are boiled in salted water until tender — a Caribbean breakfast staple. Also great in smoothies, banana bread, fried as chips, or flambéed with rum for dessert.",storage:"Store at room temperature until ripe. Refrigerate ripe bananas to slow further ripening (skin will darken but fruit stays good). Freeze peeled bananas for smoothies up to 6 months.",color:"#FFE135",emoji:"🍌",related_fruit_ids:["5","8","11"],views:7200,leaf_medicine:{has_leaf_use:!0,leaf_name:"Banana Leaf",traditional_uses:["Banana leaves used as natural wound dressings — their waxy surface creates a protective barrier that promotes healing and prevents infection","Fresh banana leaf applied to burns and scalds in Caribbean first-aid tradition — provides cooling relief","Banana flower (blossom) brewed as a tea to support lactation in breastfeeding mothers across South Asian and Caribbean communities","Banana stem juice used traditionally to treat kidney stones and urinary tract infections"],preparation:"For wound dressing: select a clean, fresh banana leaf, wash with clean water, and apply smooth (waxy) side down over the wound. Secure with cloth bandage. Replace every 8–12 hours. For banana flower tea: chop one banana blossom, boil in 3 cups water for 15 minutes, strain and drink.",safety_warnings:["Banana leaf dressings are for minor wounds only — deep wounds, heavy bleeding, or signs of infection require medical attention","Ensure leaves are clean and free from pesticides before topical application","Banana flower tea may interact with blood sugar medications","Some individuals may experience mild allergic reactions to banana latex"],disclaimer:"This information documents traditional Caribbean and South Asian folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider for wound care and health concerns."}},{id:"14",name:"Malay Apple",scientific_name:"Syzygium malaccense",description:"Malay apple, also known as Otaheite apple or mountain apple, is a stunning bell-shaped tropical fruit with a bright pink to deep red skin and crisp, white, juicy flesh. It has a mildly sweet, rose-scented flavor with a refreshing crunch. A beloved fruit tree in Caribbean yards.",nutrition:"Good source of vitamin C, vitamin A, calcium, iron, and dietary fiber. Low in calories with about 25 calories per 100g, making it an excellent light snack.",health_benefits:["High water content promotes hydration","Rich in vitamin C strengthening immune defense","Contains iron helping prevent anemia","Low calorie and high fiber aiding weight management","Traditional Caribbean remedy for diabetes and digestive issues"],seasonality:"May–August",origin:"Southeast Asia (Malaysia), widely grown in Jamaica and the Caribbean",image_url:`${Se}/fruit-images/fruit-malay-apple.jpg`,slug:"malay-apple",category:["rare","seasonal"],how_to_eat:"Wash and eat whole — the skin is edible. Bite into it like an apple for a refreshing, juicy crunch. The single seed in the center is not eaten. Also used in fruit salads and jams in the Caribbean.",storage:"Store at room temperature for 2-3 days. Refrigerate for up to one week. Not suitable for freezing due to high water content.",color:"#E91E63",emoji:"🍎",related_fruit_ids:["7","15"],views:1800},{id:"15",name:"June Plum",scientific_name:"Spondias dulcis",description:"June plum, known as golden apple or pommecythere in Trinidad, is a crunchy, tangy tropical fruit beloved across the Caribbean. Green june plums are delightfully sour and often eaten with salt and pepper, while ripe ones turn golden and develop a sweet-tart tropical flavor.",nutrition:"Good source of vitamin C, vitamin A, iron, and calcium. Contains about 46 calories per 100g with 1g of fiber.",health_benefits:["Very high in vitamin C boosting immune function","Rich in vitamin A supporting healthy vision","Iron content helps with oxygen transport in blood","Contains antioxidants that protect against cellular damage","Traditional remedy for coughs and digestive discomfort"],seasonality:"June–October (peak), sometimes year-round",origin:"Polynesia, widely cultivated in Jamaica and the Caribbean",image_url:`${Se}/fruit-images/fruit-june-plum.jpeg`,slug:"june-plum",category:["popular","seasonal"],how_to_eat:"Green june plums are eaten with salt, pepper, and sometimes hot pepper sauce. Ripe golden fruits can be eaten fresh. Also juiced, pickled, or made into chutney. In Trinidad, it's made into a beloved juice called 'pommecythere juice'.",storage:"Store green june plums at room temperature for up to a week. Ripe ones should be refrigerated and eaten within 3-4 days. Can freeze juice for later use.",color:"#CDDC39",emoji:"🟡",related_fruit_ids:["16","5"],views:3200},{id:"16",name:"Custard Apple",scientific_name:"Annona reticulata",description:"Custard apple, also known as bullock's heart in the Caribbean, is a heart-shaped fruit with a smooth reddish-brown skin and creamy, sweet white flesh with a custard-like texture. It's closely related to soursop and sugar apple, and is a cherished treat when in season.",nutrition:"Good source of vitamin C, B vitamins, potassium, magnesium, and dietary fiber. Contains about 101 calories per 100g with 4.4g of fiber.",health_benefits:["Rich in vitamin C supporting collagen production and immunity","High in potassium regulating blood pressure","Contains magnesium supporting muscle and nerve function","Dietary fiber promotes healthy digestion","B vitamins support energy metabolism and brain function"],seasonality:"August–November",origin:"Central America and Caribbean, grown across the tropics",image_url:`${Se}/fruit-images/fruit-custard-apple.png`,slug:"custard-apple",category:["rare","seasonal"],how_to_eat:"Wait until fully ripe (slightly soft to touch). Cut or break open and scoop out the sweet white flesh. Remove and discard the black seeds. Best enjoyed fresh and chilled. Can be blended into smoothies or ice cream base.",storage:"Ripen at room temperature — can take 3-5 days. Ripe fruit should be eaten within 1-2 days. The pulp can be frozen for up to 3 months.",color:"#8D6E63",emoji:"💛",related_fruit_ids:["3","9"],views:1600},{id:"17",name:"Hog Plum",scientific_name:"Spondias mombin",description:"Hog plum, also called yellow mombin, is a small tangy-sweet fruit common throughout the Caribbean. The bright yellow fruit has a thin skin, juicy flesh, and a large spiny seed. It's a nostalgic childhood fruit for many Caribbean people, often picked wild from roadside trees.",nutrition:"Good source of vitamin C, vitamin A, calcium, and phosphorus. Contains about 50 calories per 100g. The high water content makes it refreshing.",health_benefits:["Rich in vitamin C boosting the immune system","Contains vitamin A promoting healthy vision","Natural source of calcium for bone health","High water content aids in hydration","Traditional use as a natural fever reducer in Caribbean folk medicine"],seasonality:"June–September",origin:"Tropical Americas and Caribbean, grows wild in Jamaica",image_url:`${Se}/fruit-images/fruit-hogplum.jpg`,slug:"hog-plum",category:["rare","seasonal"],how_to_eat:"Eat fresh when ripe (yellow and slightly soft). Suck the tangy flesh off the spiny seed. Often eaten with salt and pepper. Also made into juice, jam, or fermented into wine in some Caribbean islands.",storage:"Store at room temperature and consume within 3-4 days. Ripe hog plums bruise easily. Can be frozen for juice making later.",color:"#FFC107",emoji:"🟡",related_fruit_ids:["15","12"],views:1400},{id:"18",name:"Dragon Fruit",scientific_name:"Hylocereus undatus",description:"Dragon fruit, also known as pitaya, is an exotic cactus fruit with a vibrant pink or yellow exterior and white or magenta flesh speckled with tiny black seeds. Its mild, subtly sweet flavor and stunning appearance have made it increasingly popular in Caribbean gardens and markets.",nutrition:"Low in calories (60 per 100g), high in fiber, vitamin C, and antioxidants. Contains iron, magnesium, and beneficial plant compounds like betalains.",health_benefits:["High in antioxidants including betalains and hydroxycinnamates","Excellent source of prebiotic fiber for gut health","Contains iron which is rare in fruits","May help lower blood sugar levels","Supports healthy skin with vitamin C and hydration"],seasonality:"Year-round in tropical climates",origin:"Central America, now grown across the Caribbean and tropics",image_url:`${Se}/fruit-images/fruit-dragonfruit.png`,slug:"dragon-fruit",category:["rare"],how_to_eat:"Cut in half lengthwise and scoop out the flesh with a spoon, or peel and slice. Eat fresh, add to smoothie bowls, or use in fruit salads. The seeds are edible and add a pleasant crunch. Chill before serving for best flavor.",storage:"Store at room temperature for 2-3 days. Refrigerate ripe dragon fruit for up to 2 weeks. Cut fruit should be consumed within 2 days. Freezes well for smoothies.",color:"#EC4899",emoji:"🐉",related_fruit_ids:["6","8"],views:2200},{id:"19",name:"Avocado",scientific_name:"Persea americana",description:"Avocado, known as 'pear' in many Caribbean islands, is a creamy, nutrient-dense fruit essential to Caribbean cuisine. Unlike most fruits, avocados are high in healthy fats rather than carbohydrates. They're eaten in salads, sandwiches, or simply with a squeeze of lime and salt.",nutrition:"Rich in heart-healthy monounsaturated fats, potassium (more than bananas), folate, vitamins K, E, C, and B6. One avocado contains about 240 calories.",health_benefits:["High in monounsaturated fats supporting heart health","More potassium than bananas for blood pressure control","Rich in fiber aiding digestion and satiety","Contains lutein for eye health","Healthy fats help absorb fat-soluble vitamins"],seasonality:"June–September (peak), some varieties year-round",origin:"Central America, widely cultivated across the Caribbean",image_url:`${Se}/fruit-images/fruit-avocado.jpeg`,slug:"avocado",category:["popular","seasonal"],how_to_eat:"Cut in half around the pit, twist to separate. Remove the pit and scoop flesh with a spoon. Eat with salt and lime, mash for guacamole, slice for salads and sandwiches, or blend into smoothies for creaminess.",storage:"Ripen at room temperature. Speed ripening by placing in a paper bag with a banana. Ripe avocados keep 2-3 days refrigerated. Sprinkle cut avocado with lime juice to prevent browning.",color:"#4ADE80",emoji:"🥑",related_fruit_ids:["11","8"],views:4500,leaf_medicine:{has_leaf_use:!0,leaf_name:"Avocado Leaf",traditional_uses:["Avocado leaf tea used traditionally in Caribbean and Mexican folk medicine to reduce high blood pressure","Leaves contain quercetin and other flavonoids with anti-inflammatory and antioxidant properties","Leaf infusion used as a digestive aid and to relieve stomach pain","Traditional remedy for menstrual cramps and irregular cycles in some Caribbean communities","Dried leaves burned and used in baths for muscle relaxation"],preparation:"Select 3–4 dried avocado leaves (or 2 fresh ones). Wash thoroughly. Steep in 2 cups of boiling water for 10–15 minutes. Strain and drink warm. Can add honey or lime. Limit to one cup per day.",safety_warnings:["Avocado leaves from the Guatemalan variety may contain persin, a fungicidal toxin — ensure you are using leaves from the Mexican or West Indian variety common in the Caribbean","Avocado leaf tea can lower blood pressure — avoid if already on hypertension medication without medical advice","Not safe for consumption by animals (toxic to dogs, cats, horses, birds)","Do not consume during pregnancy"],disclaimer:"This information documents traditional Caribbean and Latin American folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider before use."}},{id:"20",name:"Sweetsop",scientific_name:"Annona squamosa",description:"Sweetsop, also known as sugar apple or custard apple in some regions, is a tropical fruit beloved for its intensely sweet, custard-like flesh. The green, knobby exterior hides creamy white segments that melt in your mouth with notes of vanilla custard and ripe pear. A true Caribbean delicacy.",nutrition:"Rich in vitamin C (151% DV per cup), vitamin B6, potassium, magnesium, and iron. Contains about 235 calories per cup with 5.5g of fiber and natural sugars.",health_benefits:["Extremely high in vitamin C supporting collagen production and skin elasticity","Rich in vitamin B6 essential for brain function and energy metabolism","High iron content helps prevent anemia and boosts energy","Potassium supports heart health and blood pressure regulation","Antioxidant properties help protect cells from oxidative damage"],seasonality:"July–October (peak), sometimes into December",origin:"Tropical Americas and West Indies, widely grown across the Caribbean",image_url:`${Se}/fruit-images/fruit-sweetsop-apple.jpeg`,slug:"sweetsop",category:["rare","seasonal"],how_to_eat:"Wait until fully ripe (soft to gentle pressure, segments separate easily). Break open with your hands and eat the creamy white flesh segment by segment, spitting out the shiny black seeds. Best enjoyed chilled. Do not eat the seeds or skin.",storage:"Ripen at room temperature for 2-4 days. Ripe sweetsop is very delicate — refrigerate and eat within 1-2 days. Pulp can be frozen for smoothies and ice cream.",color:"#A5D6A7",emoji:"🍏",related_fruit_ids:["3","16"],views:1900,leaf_medicine:{has_leaf_use:!0,leaf_name:"Sweetsop Leaf (Sugar Apple Leaf)",traditional_uses:["Crushed sweetsop leaves applied to the scalp as a traditional treatment for head lice across the Caribbean","Leaf decoction used to induce sleep and calm restlessness — similar sedative properties to its cousin soursop","Leaves used in traditional baths for fever reduction in Jamaican and Trinidadian folk medicine","Bark and leaf preparations used traditionally for treating dysentery and diarrhea"],preparation:"For lice treatment: crush 8–10 fresh sweetsop leaves into a paste, apply to wet scalp, cover with a shower cap for 30 minutes, then wash thoroughly. For tea: steep 2–3 dried leaves in boiling water for 10 minutes. Strain and drink.",safety_warnings:["Sweetsop seeds and leaves contain annonaceous acetogenins — the same compounds found in soursop that may cause neurotoxicity with long-term overuse","NEVER consume sweetsop seeds — they are toxic","Leaf paste for lice should not be left on skin for more than 30 minutes","Internal use should be limited and not daily","Avoid during pregnancy and breastfeeding"],disclaimer:"This information documents traditional Caribbean folk medicine practices. It is not medical advice. Always consult a qualified healthcare provider before use. The lice treatment described is a folk remedy and not a substitute for medically approved treatments."}},{id:"21",name:"Sea Grape",scientific_name:"Coccoloba uvifera",description:"Sea grape is a coastal Caribbean fruit that grows in large, grape-like clusters on trees along beaches and dunes. The fruits turn from green to deep purple when ripe and have a mildly sweet, wine-like flavor. Traditionally eaten fresh, made into jellies, or fermented into homemade wine.",nutrition:"Contains vitamin C, iron, fiber, and polyphenol antioxidants. Lower in sugar than table grapes, with about 60 calories per 100g.",health_benefits:["Provides antioxidants that help neutralize free radicals","Traditional Caribbean remedy for sore throat and cough when made into syrup","Mildly astringent properties support digestive health","Rich in tannins which may support cardiovascular health","Coastal plant that helps stabilize dunes and protect against erosion"],seasonality:"June–September (coastal Caribbean)",origin:"Native to Caribbean coastlines, Florida, and Central America",image_url:`${Se}/fruit-images/fruits-seagrape.jpeg`,slug:"sea-grape",category:["rare","seasonal"],how_to_eat:"Eat ripe purple fruits fresh by sucking the pulp from the seed, or cook down with sugar and water to make a thick sea grape syrup or jelly. Traditionally fermented into homemade wine along Caribbean coasts.",storage:"Fresh sea grapes should be kept refrigerated and consumed within 3–4 days. Syrups, jellies, and wine have a much longer shelf life when properly bottled.",color:"#9C27B0",emoji:"🍇",related_fruit_ids:["17","10","12"],views:900},{id:"22",name:"Pineapple",scientific_name:"Ananas comosus",description:"Pineapple is a juicy tropical fruit loved across Jamaica and the Caribbean for its bright sweet-tart flavor. It's eaten fresh, juiced, and used in cakes, sauces, and festive drinks. Caribbean pineapples are especially fragrant when fully ripe.",nutrition:"A good source of vitamin C and manganese. Contains bromelain, an enzyme that helps break down proteins. About 50 calories per 100g.",health_benefits:["Vitamin C supports immune health","Bromelain may support digestion of proteins","Hydrating fruit with natural electrolytes","Antioxidants help reduce oxidative stress","Manganese supports bone health and metabolism"],seasonality:"Year-round, peak April–July",origin:"South America, widely cultivated throughout the Caribbean",image_url:`${Se}/fruit-images/fruits-pineapple.png`,slug:"pineapple",category:["popular","seasonal"],how_to_eat:"Slice off the crown and skin, remove the eyes, then cut into wedges or rings. Enjoy fresh, blend into juice, or use in desserts like pineapple upside-down cake.",storage:"Store whole pineapple at room temperature for 1–2 days or refrigerate for up to 5 days. Cut pineapple should be refrigerated and eaten within 2–3 days.",color:"#F9A825",emoji:"🍍",related_fruit_ids:["5","11","13"],views:4100},{id:"23",name:"Jackfruit",scientific_name:"Artocarpus heterophyllus",description:"Jackfruit is the largest tree-borne fruit in the world and is increasingly popular in the Caribbean for both sweet and savory uses. Ripe jackfruit is fragrant and sweet, while unripe jackfruit has a meaty texture that works well in stews and sandwiches.",nutrition:"Provides carbohydrates, fiber, and vitamin C, with small amounts of potassium and magnesium. About 95 calories per 100g.",health_benefits:["Fiber supports digestive health","Vitamin C supports immune function","Provides energy from natural carbohydrates","Contains antioxidants like carotenoids","Potassium supports heart health"],seasonality:"June–October",origin:"South Asia, now grown across the Caribbean and tropical regions",image_url:`${Se}/fruit-images/fruit-jackfruit.jpeg`,slug:"jackfruit",category:["rare","seasonal"],how_to_eat:"Ripe: eat the yellow pods fresh and discard seeds (seeds can be boiled/roasted separately). Unripe: cook in stews, curries, or shred for a savory filling.",storage:"Whole jackfruit is best cut and used within 2–3 days. Refrigerate cut pods in airtight containers for up to 5 days or freeze for longer storage.",color:"#FFB300",emoji:"🟡",related_fruit_ids:["2","22"],views:1200},{id:"24",name:"Lychee",scientific_name:"Litchi chinensis",description:"Lychee is a fragrant tropical fruit with a rough pink-red shell and a translucent, juicy flesh that tastes like floral grape and pear. While more common in Asia, lychee is grown in parts of the Caribbean and is prized for refreshing drinks and desserts.",nutrition:"High in vitamin C and water content. About 66 calories per 100g.",health_benefits:["Vitamin C supports immune defense","Hydrating fruit with natural sugars for quick energy","Contains polyphenol antioxidants","Provides small amounts of copper","Supports skin health via vitamin C"],seasonality:"May–July",origin:"China and Southeast Asia, cultivated in tropical regions including parts of the Caribbean",image_url:`${Se}/fruit-images/fruit-lychee.png`,slug:"lychee",category:["rare","seasonal"],how_to_eat:"Peel away the shell, eat the juicy flesh, and discard the large seed. Enjoy chilled, in fruit salads, or blended into drinks.",storage:"Refrigerate lychees in a breathable bag and use within 5–7 days. Peeled lychees can be frozen.",color:"#E53935",emoji:"🔴",related_fruit_ids:["6","22"],views:800},{id:"25",name:"Stinking Toe",scientific_name:"Hymenaea courbaril",description:"Stinking toe, also called West Indian locust, is a traditional Caribbean forest fruit with a hard brown pod. Inside is a dry, pale pulp with a strong aroma and a sweet, floury taste similar to roasted chestnut or caramel. Often eaten as a nostalgic snack.",nutrition:"Contains carbohydrates, fiber, and minerals. The dry pulp is energy-dense compared to watery fruits.",health_benefits:["Traditional energy food due to carbohydrate-rich pulp","Contains fiber that supports digestion","Historically used as a survival food in rural Caribbean communities","May provide minerals like calcium and iron","Pulp is shelf-stable and travel-friendly"],seasonality:"January–May",origin:"Native to the Caribbean and tropical Americas",image_url:`${Se}/fruit-images/fruit-stinking-toe.png`,slug:"stinking-toe",category:["rare","seasonal"],how_to_eat:"Crack open the hard pod, smell the distinctive aroma, then eat the dry pulp. Avoid chewing the very hard seeds. Traditionally eaten plain or mixed into porridge in some communities.",storage:"Unopened pods keep for weeks in a dry place. Once opened, keep pulp dry and sealed.",color:"#6D4C41",emoji:"🟤",related_fruit_ids:["12","9"],views:650},{id:"26",name:"Breadnut",scientific_name:"Artocarpus camansi",description:"Breadnut is a close relative of breadfruit, valued in the Caribbean for its nutritious seeds. The cooked seeds are eaten like nuts or beans — roasted, boiled, or stewed — and have a mild, chestnut-like flavor.",nutrition:"Good source of plant protein, complex carbohydrates, and minerals. The seeds are more protein-rich than breadfruit flesh.",health_benefits:["Plant-based protein supports muscle repair and satiety","Complex carbs provide steady energy","Contains fiber for digestive health","Seeds provide minerals like magnesium and potassium","Versatile staple for budget-friendly nutrition"],seasonality:"June–September",origin:"New Guinea, now grown in parts of the Caribbean",image_url:`${Se}/fruit-images/fruit-breadnut.png`,slug:"breadnut",category:["rare","seasonal"],how_to_eat:"Remove seeds from the fruit, rinse, then boil in salted water for 20–30 minutes until tender. Roast for a nuttier flavor. Eat as a snack or add to stews.",storage:"Fresh seeds spoil quickly—cook within 1–2 days. Cooked seeds refrigerate for 3–4 days or freeze.",color:"#8BC34A",emoji:"🌰",related_fruit_ids:["2","23"],views:300}],Pl=r=>Le.find(o=>o.slug===r),Lt=r=>Le.find(o=>o.id===r),Sh=r=>Le.filter(o=>o.category.includes(r)),dx=r=>r.related_fruit_ids.map(o=>Lt(o)).filter(Boolean),ux=()=>{const r=new Date().toLocaleString("default",{month:"long"});return Le.filter(o=>o.seasonality.toLowerCase().includes(r.toLowerCase().substring(0,3))||o.seasonality.includes("Year-round"))},mx=()=>[...Le].sort((r,o)=>o.views-r.views).slice(0,4),Dt=r=>{const o=r.toLowerCase();return Le.filter(d=>d.name.toLowerCase().includes(o)||d.description.toLowerCase().includes(o)||d.scientific_name.toLowerCase().includes(o))},He="https://raguzwxnrdanynjnppze.supabase.co/storage/v1/object/public",_a=[{id:"r1",title:"Jamaican Ackee and Saltfish",ingredients:["1 can ackee (or 12 fresh ackee arils)","250g salted codfish","1 medium onion, sliced","2 tomatoes, diced","1 scotch bonnet pepper","3 stalks scallion, chopped","2 tbsp coconut oil","1 tsp black pepper","Fresh thyme sprigs"],instructions:["Soak saltfish overnight or boil for 20 minutes, drain and flake.","Heat coconut oil in a large skillet over medium heat.","Sauté onions, tomatoes, scotch bonnet, and scallion for 3-4 minutes.","Add flaked saltfish and stir for 2 minutes.","Gently fold in ackee, being careful not to mash.","Add thyme and black pepper, cook for 3-5 minutes.","Serve with fried dumplings, breadfruit, or hard dough bread."],related_fruit_ids:["1","2"],image_url:`${He}/recipe-images/recipe-ackee-and-saltfish.jpeg`,slug:"jamaican-ackee-and-saltfish",prep_time:"15 min",cook_time:"25 min",servings:4,difficulty:"Medium",description:"Jamaica's beloved national dish combining creamy ackee with savory saltfish — a Caribbean breakfast classic packed with protein and island flavour."},{id:"r2",title:"Tropical Mango Chutney",ingredients:["3 ripe mangoes, peeled and diced","1 medium onion, finely chopped","½ cup apple cider vinegar","½ cup brown sugar","1 scotch bonnet pepper, minced","2 cloves garlic, minced","1 tbsp fresh ginger, grated","½ tsp allspice","¼ tsp cinnamon","Salt to taste"],instructions:["Combine vinegar and brown sugar in a heavy saucepan, stir over medium heat until dissolved.","Add onion, garlic, ginger, and scotch bonnet. Cook for 5 minutes.","Add diced mango, allspice, cinnamon, and salt.","Simmer on low heat for 30-40 minutes, stirring occasionally until thickened.","The chutney should be jammy but still have some fruit chunks.","Let cool completely before transferring to sterilized jars.","Serve with curried dishes, grilled meats, or as a dip with crackers."],related_fruit_ids:["5"],image_url:`${He}/recipe-images/fruit-mango-chutney.webp`,slug:"tropical-mango-chutney",prep_time:"15 min",cook_time:"40 min",servings:8,difficulty:"Easy",description:"Sweet, spicy Caribbean mango chutney with scotch bonnet heat — perfect as a condiment for any island meal."},{id:"r3",title:"Soursop Juice (Caribbean Style)",ingredients:["1 large ripe soursop","4 cups water","½ cup condensed milk","1 tsp vanilla extract","½ tsp nutmeg","Sugar to taste","Ice"],instructions:["Peel soursop and remove all seeds from the white pulp.","Add pulp and water to a blender, blend for 30 seconds.","Strain through a fine mesh sieve, pressing pulp to extract all juice.","Add condensed milk, vanilla, and nutmeg. Blend again briefly.","Taste and add sugar if needed.","Serve over ice. Garnish with a dash of nutmeg."],related_fruit_ids:["3"],image_url:`${He}/recipe-images/fruit-soursop-juice.webp`,slug:"soursop-juice-caribbean-style",prep_time:"15 min",cook_time:"0 min",servings:6,difficulty:"Easy",description:"Creamy, dreamy Caribbean soursop juice with condensed milk and nutmeg — a refreshing tropical drink bursting with antioxidants."},{id:"r4",title:"Guava Cheese (Guava Paste)",ingredients:["2 lbs ripe guava","2 cups sugar","Juice of 1 lime","¼ cup water","Pinch of cinnamon"],instructions:["Wash guavas, cut into quarters, and boil in water until very soft.","Push through a sieve to remove seeds, collecting smooth pulp.","Combine pulp, sugar, lime juice, and cinnamon in a heavy pot.","Cook over medium-low heat, stirring constantly for 40-50 minutes.","The mixture will thicken and pull away from the sides of the pot.","Pour into a greased pan and let cool completely.","Cut into squares. Serve with cheese or crackers."],related_fruit_ids:["10"],image_url:`${He}/recipe-images/recipe-guava-cheese.png`,slug:"guava-cheese-paste",prep_time:"20 min",cook_time:"60 min",servings:12,difficulty:"Medium",description:"Traditional Caribbean guava paste (guava cheese) — a sweet, dense confection perfect with cream cheese and crackers."},{id:"r5",title:"Passion Fruit Mousse",ingredients:["8 passion fruits","1 can condensed milk","1 cup heavy cream","1 tbsp gelatin powder","3 tbsp warm water","Fresh mint for garnish"],instructions:["Cut passion fruits in half and scoop out pulp. Strain half for juice, keep half with seeds.","Dissolve gelatin in warm water and let bloom.","Whip heavy cream to soft peaks.","Mix condensed milk with passion fruit juice and dissolved gelatin.","Gently fold in whipped cream and seeded pulp.","Pour into serving glasses and refrigerate for 4+ hours.","Garnish with passion fruit seeds and fresh mint."],related_fruit_ids:["6"],image_url:`${He}/recipe-images/recipe-passion-fruit-mousse.png`,slug:"passion-fruit-mousse",prep_time:"20 min",cook_time:"0 min",servings:6,difficulty:"Medium",description:"Silky smooth passion fruit mousse — a Brazilian-Caribbean fusion dessert that melts on your tongue with tropical tangy sweetness."},{id:"r6",title:"Papaya Smoothie Bowl",ingredients:["1 large ripe papaya, cubed and frozen","1 banana, frozen","½ cup coconut milk","1 tbsp honey","Juice of ½ lime","Toppings: granola, chia seeds, shredded coconut, fresh fruit slices"],instructions:["Scoop out papaya flesh, remove seeds, cube and freeze overnight.","Blend frozen papaya, banana, coconut milk, honey, and lime juice until thick and creamy.","Pour into a bowl — consistency should be thicker than a regular smoothie.","Top with granola, chia seeds, shredded coconut, and fresh fruit slices.","Drizzle extra honey on top if desired.","Serve immediately and enjoy this tropical breakfast bowl."],related_fruit_ids:["8","13"],image_url:`${He}/recipe-images/fruit-papaya-smoothie.webp`,slug:"papaya-smoothie-bowl",prep_time:"10 min",cook_time:"0 min",servings:2,difficulty:"Easy",description:"A vibrant, nutrient-packed papaya smoothie bowl bursting with Caribbean tropical flavor — rich in Vitamin C, fiber, and natural enzymes."},{id:"r7",title:"Tamarind Balls (Caribbean Candy)",ingredients:["1 lb tamarind pulp (seeds removed)","1½ cups brown sugar","1 tsp salt","½ tsp cayenne pepper (optional)","Extra sugar for rolling"],instructions:["Remove tamarind from shells and pull out seeds and stringy fibers.","Mix pulp with brown sugar, salt, and cayenne pepper in a bowl.","Knead the mixture until sugar is fully incorporated.","Roll into 1-inch balls between your palms.","Roll each ball in granulated sugar to coat.","Let set for 30 minutes before serving.","Store in an airtight container for up to 2 weeks."],related_fruit_ids:["12"],image_url:`${He}/recipe-images/recipe-tamarind-balls.png`,slug:"tamarind-balls-caribbean-candy",prep_time:"30 min",cook_time:"0 min",servings:20,difficulty:"Easy",description:"Sweet, sour, and spicy Caribbean tamarind balls — a nostalgic island candy loved by all ages across the Caribbean."},{id:"r8",title:"Caribbean Coconut Drops",ingredients:["2 cups grated dry coconut","2 cups brown sugar","1 tbsp fresh ginger, grated","½ cup water","1 tsp vanilla extract","Pinch of salt"],instructions:["Combine brown sugar and water in a heavy pot over medium heat.","Stir until sugar dissolves and mixture begins to bubble.","Add grated coconut, ginger, vanilla, and salt.","Stir continuously as the mixture thickens, about 15-20 minutes.","The mixture is ready when it begins to pull away from the pot and a drop holds its shape on a cold surface.","Drop spoonfuls onto a greased baking sheet or banana leaf.","Let cool and harden completely before eating. Store in an airtight container."],related_fruit_ids:["11"],image_url:`${He}/recipe-images/fruit-coconut-drops.webp`,slug:"caribbean-coconut-drops",prep_time:"15 min",cook_time:"25 min",servings:15,difficulty:"Medium",description:"Classic Jamaican coconut drops with ginger — a chewy, sweet, and spicy candy made with fresh coconut and brown sugar."},{id:"r9",title:"Pineapple Upside-Down Rum Cake",ingredients:["1 fresh pineapple, cored and sliced into rings","½ cup butter","¾ cup brown sugar","6 maraschino cherries","1½ cups all-purpose flour","2 tsp baking powder","¾ cup sugar","2 eggs","½ cup coconut milk","3 tbsp dark Caribbean rum","1 tsp vanilla extract"],instructions:["Preheat oven to 350°F. Melt butter in a 9-inch cast iron skillet.","Sprinkle brown sugar evenly over the melted butter.","Arrange pineapple rings and cherries in a decorative pattern on the brown sugar.","In a bowl, whisk flour, baking powder, and salt. In another bowl, cream sugar and eggs.","Add coconut milk, rum, and vanilla to the egg mixture.","Fold dry ingredients into wet ingredients until just combined.","Pour batter over pineapple arrangement and spread evenly.","Bake for 40-45 minutes until golden and a toothpick comes out clean.","Let cool 5 minutes, then flip onto a serving plate. Serve warm."],related_fruit_ids:["22","11"],image_url:`${He}/recipe-images/recipe-pineapple-upside-down-rum-cake.png`,slug:"pineapple-upside-down-rum-cake",prep_time:"20 min",cook_time:"45 min",servings:8,difficulty:"Medium",description:"A Caribbean twist on the classic pineapple upside-down cake with dark rum and coconut milk — irresistibly moist and caramelized."},{id:"r10",title:"June Plum Juice (Pommecythere Juice)",ingredients:["6-8 ripe june plums (golden yellow)","4 cups water","½ cup sugar (adjust to taste)","Juice of 1 lime","Pinch of salt","Ice for serving"],instructions:["Wash june plums and remove any blemishes.","Boil june plums in 2 cups of water for 10-15 minutes until very soft.","Let cool slightly, then remove the spiny seeds by pressing through a strainer.","Add the strained pulp to a blender with remaining 2 cups water.","Add sugar, lime juice, and salt. Blend until smooth.","Strain again for a smoother consistency if desired.","Chill and serve over ice. Stir before serving as pulp settles."],related_fruit_ids:["15"],image_url:`${He}/recipe-images/fruit-june-plum-juice.webp`,slug:"june-plum-juice",prep_time:"10 min",cook_time:"15 min",servings:4,difficulty:"Easy",description:"Refreshing Caribbean june plum juice — sweet, tangy, and perfect for hot tropical days. Rich in Vitamin C and potassium."},{id:"r11",title:"Green June Plum Drink",ingredients:["8-10 green june plums","4 cups water","¾ cup sugar","1 tsp salt","½ scotch bonnet pepper (optional)","Juice of 2 limes","Fresh mint leaves","Ice"],instructions:["Wash green june plums and score with a knife to help release flavor.","Blend june plums with 2 cups water on pulse — don't over-blend the seeds.","Strain through a coarse strainer, pressing to extract all the tangy juice.","Add remaining water, sugar, salt, lime juice, and scotch bonnet.","Stir well until sugar dissolves.","Chill for at least 1 hour to let flavors meld.","Serve over ice with fresh mint leaves. The perfect sour-sweet island refresher."],related_fruit_ids:["15"],image_url:`${He}/recipe-images/recipe-unripe-juneplum-drink.jpeg`,slug:"green-june-plum-drink",prep_time:"15 min",cook_time:"0 min",servings:6,difficulty:"Easy",description:"Tangy, tart green june plum drink with a hint of scotch bonnet — a refreshing Caribbean street-style beverage loved across the islands."},{id:"r12",title:"Starfruit Tropical Salad",ingredients:["3 ripe starfruit, sliced into stars","1 mango, cubed","½ cup pomegranate seeds","2 cups mixed greens (arugula and spinach)","¼ red onion, thinly sliced","¼ cup candied nuts","2 tbsp olive oil","1 tbsp lime juice","1 tsp honey","Salt and pepper to taste","Fresh mint for garnish"],instructions:["Wash starfruit and slice crosswise into thin star-shaped slices.","Arrange mixed greens on a large serving platter.","Top with starfruit stars, mango cubes, pomegranate seeds, and red onion.","Whisk together olive oil, lime juice, honey, salt, and pepper for the dressing.","Drizzle dressing over the salad.","Scatter candied nuts and fresh mint leaves on top.","Serve immediately as a stunning side dish or light lunch."],related_fruit_ids:["5"],image_url:`${He}/recipe-images/fruit-starfruit-dish.webp`,slug:"starfruit-tropical-salad",prep_time:"15 min",cook_time:"0 min",servings:4,difficulty:"Easy",description:"A beautiful tropical salad featuring star-shaped starfruit slices with mango, pomegranate, and a zesty lime dressing."},{id:"r13",title:"Hog Plum Pepper Sauce",ingredients:["20 ripe hog plums (yellow mombin)","4 scotch bonnet peppers","1 medium onion, roughly chopped","4 cloves garlic","1 tsp salt","½ cup apple cider vinegar","1 tbsp brown sugar","1 tsp allspice (pimento)","2 tbsp olive oil","Juice of 1 lime"],instructions:["Wash hog plums and simmer in 1 cup of water for 15 minutes until the flesh softens and pulls away from the spiny seed.","Drain and allow to cool slightly, then press through a coarse strainer to extract the pulp, discarding seeds and skins.","In a saucepan, heat olive oil over medium heat and sauté onion and garlic until golden and fragrant, about 5 minutes.","Add scotch bonnet peppers, allspice, and brown sugar, stirring for 2 minutes.","Add the hog plum pulp, apple cider vinegar, lime juice, and salt. Stir to combine.","Simmer on low heat for 15–20 minutes, stirring frequently, until the sauce thickens to your desired consistency.","Cool slightly, then blend until smooth for a silky sauce or leave slightly chunky for texture.","Pour into sterilised bottles. Refrigerate and use within 4 weeks. Serve alongside jerk chicken, fried fish, or as a dipping sauce."],related_fruit_ids:["17"],image_url:`${He}/recipe-images/recipe-hog-plum-pepper-sauce.png`,slug:"hog-plum-pepper-sauce",prep_time:"15 min",cook_time:"35 min",servings:10,difficulty:"Easy",description:"A bold, tangy Caribbean hog plum pepper sauce with scotch bonnet heat and allspice warmth — bottled island fire in every drop."},{id:"r14",title:"Sweetsop (Sugar Apple) Ice Cream",ingredients:["4 ripe sweetsops (sugar apples)","1 cup heavy whipping cream","½ cup condensed milk","1 tsp vanilla extract","¼ tsp freshly grated nutmeg","Pinch of cinnamon","Pinch of salt","Juice of ½ lime"],instructions:["Break open the ripe sweetsops and scoop out all the creamy white flesh, carefully removing and discarding every black seed — do not skip this step.","Push the pulp through a fine mesh strainer or cheesecloth to remove any remaining seed fragments and fibres, collecting smooth, silky pulp.","In a large chilled bowl, whip the heavy cream to soft peaks using a hand mixer.","Add the condensed milk, vanilla extract, nutmeg, cinnamon, salt, and lime juice to the whipped cream. Fold gently until combined.","Fold in the sweetsop pulp, keeping the mixture light and airy.","Pour into a freezer-safe container and smooth the top.","Cover tightly with plastic wrap pressed directly onto the surface to prevent ice crystals.","Freeze for a minimum of 6 hours, preferably overnight.","Remove from freezer 5 minutes before serving to soften slightly. Scoop and serve garnished with a light dusting of nutmeg."],related_fruit_ids:["20"],image_url:`${He}/recipe-images/recipe-sweetsop-icecream.png`,slug:"sweetsop-ice-cream",prep_time:"25 min",cook_time:"0 min",servings:6,difficulty:"Easy",description:"Creamy, dreamy no-churn sweetsop ice cream bursting with natural vanilla-custard sweetness — a true Caribbean frozen treat with no artificial ingredients."},{id:"r15",title:"Homemade Sea Grape Wine",ingredients:["4 lbs ripe sea grapes (deep purple, fully ripe)","1 gallon filtered water","2½ cups granulated sugar","1 packet wine yeast (or ¼ tsp active dry yeast)","1 tsp yeast nutrient","½ tsp acid blend (or juice of 2 limes)","¼ tsp potassium metabisulfite (Campden tablet) — optional, for clarity","Cheesecloth or muslin for straining","1-gallon glass fermentation jug","Airlock and bung"],instructions:["Rinse sea grapes thoroughly under cold water and pick off any stems, leaves, or unripe berries. Only use deeply purple, fully ripe fruit.","Crush sea grapes by hand or in a food processor (pulse briefly). Place crushed fruit in a large sterilised bucket.","Dissolve sugar in 2 cups of warm water and pour over crushed fruit. Add remaining water. Stir well.","If using Campden tablet, crush and stir in now. Cover with a clean cloth and wait 24 hours before adding yeast.","After 24 hours, sprinkle wine yeast and yeast nutrient over the surface. Stir gently, then cover loosely.","Ferment at room temperature (75–80°F / 24–27°C) for 5–7 days, stirring the 'must' daily and pressing down the fruit cap.","After 7 days, strain the liquid through cheesecloth into a sterilised glass jug, squeezing pulp to extract all juice. Discard solids.","Fit the jug with an airlock. Leave to ferment undisturbed for 3–4 weeks until bubbling stops completely.","Carefully siphon (rack) the wine off the sediment into a clean sterilised jug. Seal and age for a further 4–8 weeks for best flavour.","Once clear and stable, bottle into sterilised wine bottles. Cork tightly. Age at least 2 weeks before drinking — or longer for a smoother wine.","Serve chilled. The finished wine should be a beautiful deep ruby-red with a fruity, slightly tart flavour unique to the Caribbean coastline."],related_fruit_ids:["21"],image_url:`${He}/recipe-images/recipe-homemade-seagrape-wine%20(1).jpeg`,slug:"homemade-sea-grape-wine",prep_time:"1 hour",cook_time:"6-10 weeks (fermentation)",servings:12,difficulty:"Advanced",description:"A traditional Caribbean homemade sea grape wine — deep ruby-red, fruity, and slightly tart. Brewed from wild-harvested coastal sea grapes using an authentic island winemaking method passed down through generations."},{id:"r16",title:"Jamaican Ackee Porridge Breakfast Spread",ingredients:["1 can ackee (or 12 fresh ackee arils)","1 cup coconut milk","½ cup rolled oats","1 tbsp honey or brown sugar (to taste)","½ tsp vanilla extract","¼ tsp ground nutmeg","¼ tsp ground cinnamon","Pinch of salt","1 tbsp lime juice","Optional: 1 ripe banana for extra sweetness"],instructions:["If using saltfree canned ackee: drain and rinse gently. If using fresh ackee: ensure it opened naturally, remove seeds and red membrane, then boil arils for 5–10 minutes and drain.","In a small saucepan, bring coconut milk to a gentle simmer. Stir in the rolled oats and cook on low for 6–8 minutes until soft.","Add ackee to the pot and warm for 2 minutes.","Transfer mixture to a blender. Add honey (or brown sugar), vanilla, nutmeg, cinnamon, salt, and lime juice.","Blend until smooth and spreadable. For a thicker spread, blend longer; for a looser porridge texture, add a splash of water.","Taste and adjust sweetness and spices.","Serve warm as a porridge bowl or cool slightly and use as a breakfast spread on toast, pancakes, or crackers."],related_fruit_ids:["1","11"],image_url:`${He}/recipe-images/recipe-jamaican-ackee-porridge-breakfast-spread.png`,slug:"jamaican-ackee-porridge-breakfast-spread",prep_time:"10 min",cook_time:"10 min",servings:4,difficulty:"Easy",description:"A creamy Jamaican-style ackee breakfast porridge/spread blended with coconut milk, warm spices, and lime — perfect on toast or as a comforting bowl."},{id:"r17",title:"Rose Apple (Otaheite Apple) Juice",ingredients:["6 rose apples (Otaheite apples), washed and chopped","3 cups cold water","2 tbsp honey or cane sugar (to taste)","Juice of 1 lime","Pinch of salt","Ice for serving"],instructions:["Remove any bruised spots from the rose apples and discard the core/seeds.","Add chopped rose apples and water to a blender and blend for 30–45 seconds.","Strain through a fine mesh strainer into a pitcher, pressing gently to extract the juice.","Stir in lime juice, a pinch of salt, and sweetener to taste.","Chill for 30 minutes.","Serve over ice."],related_fruit_ids:["14"],image_url:`${He}/recipe-images/recipe-roseapple-juice.jpeg`,slug:"rose-apple-juice",prep_time:"10 min",cook_time:"0 min",servings:4,difficulty:"Easy",description:"A refreshing Jamaican-style rose apple (Otaheite apple) juice — light, floral, and brightened with fresh lime."},{id:"r18",title:"Jamaican Banana Porridge",ingredients:["2 ripe bananas, mashed","2 cups water","1 cup coconut milk","½ cup cornmeal","¼ tsp ground nutmeg","¼ tsp ground cinnamon","1 tsp vanilla extract","1–2 tbsp brown sugar (to taste)","Pinch of salt"],instructions:["In a saucepan, whisk cornmeal into water over medium heat to prevent lumps.","Cook for 6–8 minutes, stirring, until it begins to thicken.","Add coconut milk, mashed bananas, salt, nutmeg, and cinnamon. Stir well.","Simmer on low for 5–7 minutes until creamy.","Stir in vanilla and sweeten to taste.","Serve warm."],related_fruit_ids:["13"],image_url:`${He}/recipe-images/recipe-banana-porridge%20(1).jpeg`,slug:"jamaican-banana-porridge",prep_time:"10 min",cook_time:"15 min",servings:4,difficulty:"Easy",description:"Classic Jamaican banana porridge made with cornmeal and coconut milk — creamy, warming, and naturally energizing."},{id:"r19",title:"Papaya-Passion-Guava Elixir (Island Trio)",ingredients:["3 cups ripe papaya, peeled & diced (~450 g)","1 cup guava flesh, chopped, seeds removed if possible (~180 g)","Pulp of 6 passion fruits (about ½ cup / scoop the seeds & juice)","½ cup coconut water or cold water (120 ml)","Juice of 1 lime (≈ 30 ml)","2 tbsp honey or agave (≈ 30 ml) — adjust to taste","1 cup ice (about 8–10 cubes)","Pinch of fine sea salt (optional — brightens flavor)","Optional: 1 small knob fresh ginger (2–3 mm slice) for a spicy kick","Optional: fresh mint for garnish","Optional: 30–45 ml white rum for cocktail version"],instructions:["Prep fruit: peel, seed and chop papaya. Halve guavas and scoop out flesh; press through a sieve or pick out big seeds (guava seeds are edible but grainy). Halve passion fruits and scoop pulp into a bowl.","Add to blender in this order: papaya, guava, passion fruit pulp, coconut water, lime juice, honey, and a pinch of salt.","Blend on high until completely smooth (about 45–60 seconds). Stop, taste, and adjust: more honey for sweetness, more lime for acidity, or a splash more water for a thinner consistency.","If you prefer a seed-free, silky juice: pour the blended mixture through a fine mesh strainer into a pitcher, pressing with the back of a spoon. (If you like texture, skip straining.)","Add ice to the pitcher or return strained juice + ice to the blender and pulse once to chill and slightly froth.","Serve cold over ice, garnish with a lime wheel and mint. If making cocktails, add rum at the serving stage and stir gently."],related_fruit_ids:["8","6","10"],image_url:"https://customer-assets.emergentagent.com/job_zip-site-clone/artifacts/5pje2lfc_ChatGPT%20Image%20Mar%201%2C%202026%2C%2004_44_55%20PM.png",slug:"papaya-passion-guava-elixir",prep_time:"15 min",cook_time:"5 min",servings:4,difficulty:"Easy",description:"Bright, tropical, and balanced — papaya's creaminess, passion fruit's tang, and guava's floral sweetness come together in this refreshing Island Trio elixir."},{id:"r20",title:"Lychee Lime Cooler",ingredients:["2 cups fresh lychees, peeled and pitted","1 cup cold coconut water","Juice of 2 fresh limes (about ¼ cup)","1–2 tbsp honey or agave syrup (to taste)","1 cup ice","Small pinch of sea salt (optional but recommended)","Optional: fresh mint leaves","Optional: thin slices of cucumber (cooling effect)","Optional: sparkling water (to top)"],instructions:["Add lychees, coconut water, lime juice, sweetener, salt, and ice to a blender.","Blend on high for 45 seconds until smooth and pale pearly-pink.","Taste and adjust sweetness or acidity.","Strain if desired for a clear, juice-style finish.","Serve over ice, garnish with mint or lime wheel."],related_fruit_ids:["24"],image_url:`${He}/recipe-images/recipe-lychee-lime-cooler.jpeg`,slug:"lychee-lime-cooler",prep_time:"10 min",cook_time:"0 min",servings:4,difficulty:"Easy",description:"Light, floral, and ultra-refreshing lychee drink with bright citrus finish — perfect for hot climates and hydration."},{id:"r21",title:"Dragon Fruit Coconut Refresher",ingredients:["2 cups ripe dragon fruit (pink or white flesh), cubed","1 cup coconut milk (light) or coconut water","Juice of 1 lime","1 tbsp honey or agave (optional)","1 cup ice","Optional: ¼ banana (for extra creaminess)","Optional: chia seeds (nutrient boost)","Optional: vanilla extract (¼ tsp)"],instructions:["Place dragon fruit, coconut liquid, lime juice, sweetener, and ice into blender.","Blend until creamy and evenly colored (45–60 seconds).","Adjust thickness with more coconut water if needed.","Serve immediately in clear glasses to showcase color."],related_fruit_ids:["18"],image_url:`${He}/recipe-images/recipe-dragon-fruit-refresher.jpeg`,slug:"dragon-fruit-coconut-refresher",prep_time:"10 min",cook_time:"0 min",servings:4,difficulty:"Easy",description:"Smooth, mildly sweet, and visually striking dragon fruit drink with creamy coconut body and soft citrus lift."},{id:"r22",title:"Lychee Dragon Fruit Splash",ingredients:["1½ cups fresh dragon fruit (pink or white flesh), diced","1¼ cups peeled, pitted lychees (fresh or canned in juice, drained)","¾ cup cold coconut water (or filtered water)","Juice of 1 small lime (about 2 tbsp)","1–2 tbsp honey or agave syrup (to taste)","1 cup ice cubes","Pinch of sea salt (optional, enhances sweetness)","Optional: 4–5 fresh mint leaves (extra refreshing)","Optional: ½ tsp rose water (luxury floral note)","Optional: sparkling water (to top, for a fizzy version)","Optional: white rum or vodka (30–45 ml per glass, cocktail version)"],instructions:["Prepare the fruit: Peel and cube the dragon fruit. Peel lychees and remove pits completely.","Blend: Add dragon fruit, lychees, coconut water, lime juice, sweetener, salt, and ice to a blender.","Blend until smooth: Blend on high for 45–60 seconds until vibrant pink and silky.","Taste & adjust: Adjust sweetness or acidity if needed. Add a splash more coconut water if too thick.","Strain (optional): For an ultra-smooth juice, strain through a fine mesh sieve. For texture, serve as-is.","Serve: Pour into chilled glasses over ice. Garnish with mint, a lychee, or dragon fruit slice.","Mocktail variation: Top with sparkling water and extra lime zest.","Cocktail variation: Add rum or vodka and stir gently."],related_fruit_ids:["24","18"],image_url:"https://customer-assets.emergentagent.com/job_zip-site-clone/artifacts/kdy56ah4_ChatGPT%20Image%20Mar%201%2C%202026%2C%2004_54_05%20PM.png",slug:"lychee-dragon-fruit-splash",prep_time:"10 min",cook_time:"0 min",servings:4,difficulty:"Easy",description:"A light, floral, jewel-pink drink where sweet lychee meets the mellow freshness of dragon fruit — refreshing tropical recipe at its finest."}],hx=r=>_a.fin
